<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Account Finder | Bank Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #f0f2f8;
        font-family: "Inter", sans-serif;
        color: #1a1f2c;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      /* ========== MAIN CONTAINER ========== */
      .app-container {
        max-width: 680px;
        margin: 0 auto;
        padding: 0 16px 40px 16px;
      }

      /* ========== HEADER ========== */
      .bank-header {
        position: sticky;
        top: 0;
        background: linear-gradient(135deg, #0f9d58 0%, #0a7c42 100%);
        z-index: 100;
        padding: 16px 0;
        margin-bottom: 20px;
        box-shadow: 0 4px 12px rgba(15, 157, 88, 0.25);
      }

      .header-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 4px;
      }

      .logo-area {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .bank-icon {
        width: 42px;
        height: 42px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(10px);
      }

      .bank-icon i {
        font-size: 20px;
        color: white;
      }

      .bank-title {
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: -0.3px;
        color: white;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      }

      .bank-subtitle {
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.85);
        font-weight: 500;
      }

      .back-button {
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 50px;
        padding: 8px 18px;
        font-size: 0.85rem;
        font-weight: 600;
        font-family: "Inter", sans-serif;
        color: white;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
        backdrop-filter: blur(10px);
      }

      .back-button:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: translateX(-2px);
      }

      /* ========== SEARCH SECTION ========== */
      .search-section {
        margin-bottom: 24px;
      }

      .input-card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      }

      .search-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: #6b7c93;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .search-label i {
        color: #0f9d58;
      }

      .input-wrapper {
        background: #f8f9fc;
        border: 2px solid #e8ecf4;
        border-radius: 16px;
        transition: all 0.25s ease;
      }

      .input-wrapper:focus-within {
        border-color: #0f9d58;
        background: white;
        box-shadow: 0 0 0 4px rgba(15, 157, 88, 0.12);
      }

      .input-with-icon {
        display: flex;
        align-items: center;
        padding: 4px 8px 4px 16px;
      }

      .search-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #0f9d58 0%, #0a7c42 100%);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .search-icon i {
        color: white;
        font-size: 14px;
      }

      #acctInput {
        flex: 1;
        padding: 14px 12px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 1.1rem;
        font-weight: 600;
        background: transparent;
        border: none;
        outline: none;
        color: #1a2c3e;
        letter-spacing: 0.02em;
      }

      #acctInput::placeholder {
        font-family: "Inter", sans-serif;
        font-weight: 500;
        font-size: 0.95rem;
        color: #a0aab8;
        letter-spacing: normal;
      }

      .input-clear {
        background: #f0f2f6;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        font-size: 1rem;
        cursor: pointer;
        color: #6b7c93;
        display: none;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .input-clear.show {
        display: flex;
      }

      .input-clear:hover {
        background: #fee2e2;
        color: #d1453b;
      }

      /* ========== INPUT INFO ========== */
      .input-info {
        margin-top: 14px;
        min-height: 32px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .error-message {
        color: #dc2626;
        background: #fef2f2;
        padding: 8px 14px;
        border-radius: 10px;
        font-size: 0.75rem;
        font-weight: 600;
        width: 100%;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .detect-chip {
        background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        border-radius: 50px;
        padding: 6px 12px;
        font-size: 0.7rem;
        font-weight: 600;
        font-family: "IBM Plex Mono", monospace;
        color: #1b5e20;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .format-hint {
        background: #fff3e0;
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 0.7rem;
        color: #e65100;
        width: 100%;
      }

      /* ========== RESULT CARD ========== */
      .result-card {
        background: white;
        border-radius: 24px;
        padding: 24px;
        margin-bottom: 24px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        animation: slideUp 0.3s ease;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .result-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #0f9d58;
        background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        padding: 6px 14px;
        border-radius: 50px;
        margin-bottom: 16px;
      }

      .full-number-block {
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        border-radius: 20px;
        padding: 24px 16px;
        text-align: center;
        margin-bottom: 20px;
        border: 1px solid #e2e8f0;
      }

      .full-number-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 700;
        color: #94a3b8;
        margin-bottom: 12px;
      }

      .full-number {
        font-family: "IBM Plex Mono", monospace;
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #0f172a;
        word-break: break-all;
        line-height: 1.4;
      }

      /* ========== DETAILS GRID ========== */
      .details-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 20px;
      }

      .detail-card {
        background: #f8fafc;
        border-radius: 16px;
        padding: 16px 12px;
        text-align: center;
        border: 1px solid #e2e8f0;
        transition: all 0.2s;
      }

      .detail-card:hover {
        border-color: #0f9d58;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(15, 157, 88, 0.1);
      }

      .detail-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 10px;
      }

      .detail-icon i {
        font-size: 14px;
        color: #0f9d58;
      }

      .detail-card:nth-child(2) .detail-icon {
        background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      }

      .detail-card:nth-child(2) .detail-icon i {
        color: #1565c0;
      }

      .detail-card:nth-child(3) .detail-icon {
        background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
      }

      .detail-card:nth-child(3) .detail-icon i {
        color: #ef6c00;
      }

      .detail-label {
        font-size: 0.6rem;
        font-weight: 700;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 6px;
      }

      .detail-code {
        font-family: "IBM Plex Mono", monospace;
        font-size: 1rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 4px;
      }

      .detail-name {
        font-size: 0.65rem;
        font-weight: 600;
        color: #0f9d58;
        line-height: 1.3;
        min-height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .detail-name.scheme-name {
        color: #1565c0;
        font-size: 0.6rem;
      }

      .detail-name.account-type {
        color: #ef6c00;
      }

      /* ========== COPY BUTTON ========== */
      .copy-button {
        width: 100%;
        background: linear-gradient(135deg, #0f9d58 0%, #0a7c42 100%);
        border: none;
        border-radius: 14px;
        padding: 16px;
        font-family: "Inter", sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 4px 15px rgba(15, 157, 88, 0.3);
      }

      .copy-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(15, 157, 88, 0.4);
      }

      .copy-button.copied {
        background: linear-gradient(135deg, #059669 0%, #047857 100%);
      }

      /* ========== DIVIDED NOTE ========== */
      .divided-note {
        background: #fff8e1;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 0.72rem;
        color: #f57c00;
        margin-bottom: 16px;
        display: none;
        border-left: 3px solid #ff9800;
      }

      .divided-note.show {
        display: block;
      }

      /* ========== HISTORY CARD ========== */
      .history-card {
        background: white;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      }

      .history-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 20px;
        border-bottom: 1px solid #f1f5f9;
        background: #fafbfc;
      }

      .history-title {
        font-weight: 700;
        font-size: 0.9rem;
        color: #1e293b;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .history-title i {
        color: #0f9d58;
      }

      .hist-count {
        background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        border-radius: 50px;
        padding: 4px 10px;
        font-size: 0.7rem;
        font-weight: 700;
        color: #1b5e20;
      }

      .clear-history {
        background: none;
        border: none;
        font-size: 0.75rem;
        font-weight: 600;
        color: #94a3b8;
        cursor: pointer;
        padding: 6px 12px;
        border-radius: 8px;
        transition: all 0.2s;
      }

      .clear-history:hover {
        background: #fee2e2;
        color: #dc2626;
      }

      .history-list {
        max-height: 320px;
        overflow-y: auto;
      }

      .history-empty {
        padding: 48px 20px;
        text-align: center;
      }

      .history-empty i {
        font-size: 42px;
        color: #cbd5e1;
        margin-bottom: 12px;
        display: block;
      }

      .history-empty p {
        font-size: 0.85rem;
        color: #94a3b8;
        font-weight: 500;
      }

      .hist-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-bottom: 1px solid #f8fafc;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .hist-item:hover {
        background: #f8fafc;
        padding-left: 24px;
      }

      .hist-left {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .hist-input {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.78rem;
        font-weight: 600;
        color: #64748b;
        background: #f1f5f9;
        padding: 5px 10px;
        border-radius: 8px;
        word-break: break-all;
      }

      .hist-arrow {
        color: #cbd5e1;
        font-size: 0.8rem;
      }

      .hist-output {
        font-family: "IBM Plex Mono", monospace;
        font-weight: 700;
        font-size: 0.78rem;
        color: #0f9d58;
        background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        padding: 5px 10px;
        border-radius: 8px;
      }

      .reuse-icon {
        background: #f1f5f9;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        color: #94a3b8;
        transition: all 0.15s;
        margin-left: 10px;
      }

      .hist-item:hover .reuse-icon {
        background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        color: #0f9d58;
      }

      /* ========== FOOTER ========== */
      .footer-note {
        text-align: center;
        font-size: 0.7rem;
        color: #94a3b8;
        margin-top: 24px;
        padding: 16px;
        font-weight: 500;
      }

      /* ========== RESPONSIVE ========== */
      @media (max-width: 550px) {
        .app-container {
          padding: 0 12px 32px;
        }

        .bank-header {
          padding: 14px 0;
        }

        .bank-title {
          font-size: 1.1rem;
        }

        .bank-subtitle {
          display: none;
        }

        .back-button {
          padding: 6px 14px;
          font-size: 0.8rem;
        }

        .back-button span {
          display: none;
        }

        .full-number {
          font-size: 1.35rem;
          letter-spacing: 0.02em;
        }

        .details-grid {
          grid-template-columns: repeat(3, 1fr);
          gap: 8px;
        }

        .detail-card {
          padding: 12px 8px;
        }

        .detail-code {
          font-size: 0.85rem;
        }

        .detail-name {
          font-size: 0.55rem;
        }

        .detail-icon {
          width: 30px;
          height: 30px;
        }

        .detail-icon i {
          font-size: 12px;
        }

        .hist-left {
          gap: 6px;
        }

        .hist-input,
        .hist-output {
          font-size: 0.7rem;
          padding: 4px 8px;
        }

        .result-card {
          padding: 18px;
          border-radius: 20px;
        }

        .input-card {
          padding: 16px;
          border-radius: 18px;
        }

        #acctInput {
          font-size: 1rem;
          padding: 12px 10px;
        }
      }

      @media (max-width: 380px) {
        .details-grid {
          grid-template-columns: 1fr;
        }

        .detail-card {
          display: flex;
          align-items: center;
          gap: 12px;
          text-align: left;
          padding: 12px;
        }

        .detail-icon {
          margin: 0;
        }

        .detail-content {
          flex: 1;
        }

        .detail-label {
          margin-bottom: 2px;
        }

        .detail-name {
          min-height: auto;
          justify-content: flex-start;
        }
      }

      /* Hide extra elements */
      .hero,
      .format-pills,
      .struct-bar,
      .examples-card,
      .hero-eyebrow,
      .hero-title,
      .hero-sub,
      .format-pills,
      .struct-bar,
      .ex-grid {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- Bank Header -->
      <div class="bank-header">
        <div class="header-content">
          <div class="logo-area">
            <div class="bank-icon">
              <i class="fa-solid fa-building-columns"></i>
            </div>
            <div>
              <div class="bank-title">Account Finder</div>
              <div class="bank-subtitle">RNSB Bank Tool</div>
            </div>
          </div>
          <button class="back-button" id="backBtn">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Back</span>
          </button>
        </div>
      </div>

      <!-- Search Section -->
      <div class="search-section">
        <div class="input-card">
          <div class="search-label">
            <i class="fa-solid fa-magnifying-glass"></i>
            Enter Account Number
          </div>
          <div class="input-wrapper" id="searchWrapper">
            <div class="input-with-icon">
              <div class="search-icon">
                <i class="fa-solid fa-n"></i>
              </div>
              <input
                type="text"
                id="acctInput"
                placeholder="e.g. 21 31 81189 or 0210031000008189"
                autocomplete="off"
                spellcheck="false"
              />
              <button class="input-clear" id="clearBtn" aria-label="Clear">
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
          </div>
          <div class="input-info" id="inputInfoArea"></div>
        </div>
      </div>

      <!-- Result Card -->
      <div class="result-card" id="resultCard" style="display: none">
        <div class="result-badge">
          <i class="fa-solid fa-check-circle"></i>
          Valid Account Number
        </div>

        <div class="full-number-block">
          <div class="full-number-label">Full Account Number</div>
          <div class="full-number" id="fullNumberDisplay">—</div>
        </div>

        <div class="details-grid">
          <div class="detail-card">
            <div class="detail-icon">
              <i class="fa-solid fa-building"></i>
            </div>
            <div class="detail-content">
              <div class="detail-label">Branch</div>
              <div class="detail-code" id="branchCode">—</div>
              <div class="detail-name" id="branchName">—</div>
            </div>
          </div>
          <div class="detail-card">
            <div class="detail-icon">
              <i class="fa-solid fa-file-invoice"></i>
            </div>
            <div class="detail-content">
              <div class="detail-label">Scheme</div>
              <div class="detail-code" id="schemeCode">—</div>
              <div class="detail-name scheme-name" id="schemeName">—</div>
            </div>
          </div>
          <div class="detail-card">
            <div class="detail-icon">
              <i class="fa-solid fa-wallet"></i>
            </div>
            <div class="detail-content">
              <div class="detail-label">Account</div>
              <div class="detail-code" id="accountNum">—</div>
              <div class="detail-name account-type" id="accountType">—</div>
            </div>
          </div>
        </div>

        <div class="divided-note" id="dividedNote"></div>

        <button class="copy-button" id="copyBtn">
          <i class="fa-regular fa-copy" id="copyIcon"></i>
          <span id="copyLabel">Copy Full Number</span>
        </button>
      </div>

      <!-- History Card -->
      <div class="history-card">
        <div class="history-head">
          <div class="history-title">
            <i class="fa-solid fa-clock-rotate-left"></i>
            Recent Lookups
            <span class="hist-count" id="histCount">0</span>
          </div>
          <button class="clear-history" id="hclearBtn">Clear All</button>
        </div>
        <div class="history-list" id="histList">
          <div class="history-empty" id="histEmptyMsg">
            <i class="fa-solid fa-clock"></i>
            <p>No recent lookups yet</p>
          </div>
        </div>
      </div>

      <div class="footer-note">
        <i class="fa-solid fa-shield-halved"></i>
        Format: Branch(3) + Scheme(4) + Account(8) = 15 Digits
      </div>
    </div>

    <script>
      // ========== DATA ==========
      const branches = [
        { code: "010", name: "PARABAZAR BRANCH" },
        { code: "011", name: "UDYOGNAGAR BRANCH" },
        { code: "012", name: "KEVADAWADI-S.V.P.ROAD BR" },
        { code: "013", name: "JUNCTION PLOT BRANCH" },
        { code: "014", name: "BEDIPARA BRANCH" },
        { code: "015", name: "YAGNIK ROAD BRANCH" },
        { code: "016", name: "MOBILE BRANCH" },
        { code: "017", name: "SORATHIYAWADI BRANCH" },
        { code: "018", name: "MAVDI PLOT BRANCH" },
        { code: "019", name: "BHUPENDRA ROAD BRANCH" },
        { code: "020", name: "KLV ROAD BRANCH" },
        { code: "021", name: "RAIYA ROAD BRANCH" },
        { code: "022", name: "150 FEET RING ROAD BRANCH" },
        { code: "023", name: "KOTHARIA MAIN ROAD BRANCH" },
        { code: "041", name: "WANKANER BRANCH" },

      // Account Type Mappings
      const ACCOUNT_TYPES = {
        "0031": { name: "Savings Account", short: "SB" },
        "0038": { name: "Current Account", short: "CA" },
        "0032": { name: "Current Account", short: "CA" },
        "0033": { name: "Fixed Deposit", short: "FD" },
        "0034": { name: "Recurring Deposit", short: "RD" },
        "0035": { name: "Overdraft Account", short: "OD" },
        "0036": { name: "Cash Credit", short: "CC" },
        "0037": { name: "Loan Account", short: "LN" },
      };

      // ========== LOOKUP FUNCTIONS ==========
      function getBranchName(code) {
        const branch = branches.find((b) => b.code === code);
        return branch ? branch.name : null;
      }

      function getSchemeName(code) {
        const scheme = LOAN_SCHEMES.find((s) => s.code === code);
        return scheme ? scheme.desc : null;
      }

      function getAccountType(schemeCode) {
        return ACCOUNT_TYPES[schemeCode] || null;
      }

      // ========== PARSING ENGINE ==========
      function pad(v, n) {
        return String(v).padStart(n, "0");
      }

      function parse(raw) {
        if (!raw || !raw.trim()) return null;
        if (/[a-zA-Z]/.test(raw))
          return {
            error: "Only digits and separators (/ - space) are allowed.",
          };

        const parts = raw
          .trim()
          .split(/[\s/\-]+/)
          .filter((p) => /^\d+$/.test(p) && p.length > 0);
        if (!parts.length) return { error: "No numeric parts found." };

        // 1 part
        if (parts.length === 1) {
          const d = parts[0];
          if (d.length === 15) {
            return {
              branch: d.slice(0, 3),
              scheme: d.slice(3, 7),
              account: d.slice(7, 15),
              type: "15-Digit Full Number",
              typeKey: "full",
              full: d,
            };
          }
          if (d.length >= 8 && d.length <= 14) {
            const branch = pad(d.slice(0, 3), 3);
            const scheme = pad(d.slice(3, 7), 4);
            const acctRaw = d.slice(7);
            if (acctRaw.length > 8)
              return {
                error: `Account part has ${acctRaw.length} digits after split (max 8).`,
              };
            const account = pad(acctRaw, 8);
            const full = branch + scheme + account;
            return {
              branch,
              scheme,
              account,
              type: "Raw Concatenated",
              typeKey: "raw",
              full,
            };
          }
          if (d.length < 8)
            return {
              error: `Only ${d.length} raw digits. Need at least 8, or use separators.`,
            };
          if (d.length > 15)
            return { error: `${d.length} digits is too long. Maximum is 15.` };
        }

        // 2 parts
        if (parts.length === 2) {
          const [p0, p1] = parts;
          if (p1.length >= 6) {
            const branch = pad(p0, 3);
            const scheme = pad(p1.slice(0, 4), 4);
            const acctRaw = p1.slice(4);
            if (acctRaw.length > 8)
              return { error: "Account part too long in 2-part input." };
            const account = pad(acctRaw, 8);
            const full = branch + scheme + account;
            if (full.length !== 15)
              return {
                error: "Could not form 15-digit number from 2-part input.",
              };
            return {
              branch,
              scheme,
              account,
              type: "Two-Part Auto-Split",
              typeKey: "two",
              full,
            };
          }
          return {
            error:
              "Two-part input ambiguous. Use: branch/scheme/account format.",
          };
        }

        // 3 parts
        if (parts.length === 3) {
          const [b, s, a] = parts;
          if (b.length > 3)
            return { error: `Branch "${b}" is ${b.length} digits (max 3).` };
          if (s.length > 4)
            return { error: `Scheme "${s}" is ${s.length} digits (max 4).` };
          if (a.length > 8)
            return { error: `Account "${a}" is ${a.length} digits (max 8).` };
          const branch = pad(b, 3),
            scheme = pad(s, 4),
            account = pad(a, 8);
          const full = branch + scheme + account;
          if (full.length !== 15)
            return { error: "Could not form 15-digit number." };
          return {
            branch,
            scheme,
            account,
            type: "Standard (B/S/A)",
            typeKey: "standard",
            full,
          };
        }

        // 4 parts
        if (parts.length === 4) {
          const [b, s, sub, main] = parts;
          if (b.length > 3) return { error: `Branch "${b}" too long (max 3).` };
          if (s.length > 4) return { error: `Scheme "${s}" too long (max 4).` };
          if (sub.length > 2)
            return { error: `Division "${sub}" too long (max 2 digits).` };
          if (main.length > 6)
            return { error: `Account main "${main}" too long (max 6 digits).` };
          const branch = pad(b, 3);
          const scheme = pad(s, 4);
          const subPad = pad(sub, 2);
          const mainPad = pad(main, 6);
          const account = subPad + mainPad;
          const full = branch + scheme + account;
          if (full.length !== 15)
            return { error: "Could not form 15-digit number." };
          return {
            branch,
            scheme,
            account,
            type: "Divided Format (B/S/D/N)",
            typeKey: "divided",
            full,
            sub: subPad,
            main: mainPad,
          };
        }

        return {
          error:
            "Too many parts. Use: branch/scheme/account or branch/scheme/division/number.",
        };
      }

      // ========== HISTORY STORAGE ==========
      const HIST_KEY = "acctfind_bank_v2";
      const MAX_HIST = 15;

      function loadHist() {
        try {
          return JSON.parse(localStorage.getItem(HIST_KEY) || "[]");
        } catch {
          return [];
        }
      }
      function saveHist(h) {
        localStorage.setItem(HIST_KEY, JSON.stringify(h));
      }

      function addHist(inputVal, result) {
        let h = loadHist();
        h = h.filter((x) => x.input !== inputVal);
        h.unshift({
          input: inputVal,
          output: result.full,
          branchCode: result.branch,
          schemeCode: result.scheme,
          key: result.typeKey,
        });
        saveHist(h.slice(0, MAX_HIST));
        renderHist();
      }

      function renderHist() {
        const h = loadHist();
        const histContainer = document.getElementById("histList");
        const histCountSpan = document.getElementById("histCount");
        histCountSpan.textContent = h.length;
        if (!h.length) {
          histContainer.innerHTML = `
            <div class="history-empty">
              <i class="fa-solid fa-clock"></i>
              <p>No recent lookups yet</p>
            </div>`;
          return;
        }
        histContainer.innerHTML = "";
        h.forEach((item) => {
          const div = document.createElement("div");
          div.className = "hist-item";
          div.innerHTML = `
            <div class="hist-left">
              <span class="hist-input">${escapeHtml(item.input)}</span>
              <span class="hist-arrow"><i class="fa-solid fa-arrow-right"></i></span>
              <span class="hist-output">${item.output}</span>
            </div>
            <div class="reuse-icon"><i class="fa-solid fa-rotate-right"></i></div>
          `;
          div.addEventListener("click", (e) => {
            e.stopPropagation();
            const inputEl = document.getElementById("acctInput");
            inputEl.value = item.input;
            handleAutoConvert();
            inputEl.focus();
          });
          histContainer.appendChild(div);
        });
      }

      function escapeHtml(str) {
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&";
          if (m === "<") return "<";
          if (m === ">") return ">";
          return m;
        });
      }

      // ========== UI ELEMENTS ==========
      let currentParsedResult = null;
      const inputEl = document.getElementById("acctInput");
      const clearBtn = document.getElementById("clearBtn");
      const resultCard = document.getElementById("resultCard");
      const fullNumberSpan = document.getElementById("fullNumberDisplay");
      const branchCodeSpan = document.getElementById("branchCode");
      const branchNameSpan = document.getElementById("branchName");
      const schemeCodeSpan = document.getElementById("schemeCode");
      const schemeNameSpan = document.getElementById("schemeName");
      const accountNumSpan = document.getElementById("accountNum");
      const accountTypeSpan = document.getElementById("accountType");
      const dividedNoteDiv = document.getElementById("dividedNote");
      const copyButton = document.getElementById("copyBtn");
      const copyIcon = document.getElementById("copyIcon");
      const copyLabelSpan = document.getElementById("copyLabel");
      const infoArea = document.getElementById("inputInfoArea");
      const backBtn = document.getElementById("backBtn");

      function showErrorMsg(msg) {
        infoArea.innerHTML = `<div class="error-message"><i class="fa-solid fa-circle-exclamation"></i> ${msg}</div>`;
        resultCard.style.display = "none";
        currentParsedResult = null;
      }

      function showFormatHint() {
        infoArea.innerHTML = `<div class="format-hint"><i class="fa-solid fa-lightbulb"></i> Format: Branch(3) / Scheme(4) / Account(8) → 15 digits. Example: 21 31 81189 or 0210031000008189</div>`;
      }

      function hideErrorMsg() {
        infoArea.innerHTML = "";
      }

      function updateResultUI(result) {
        if (!result || result.error) {
          resultCard.style.display = "none";
          currentParsedResult = null;
          return false;
        }
        currentParsedResult = result;

        // Full number
        fullNumberSpan.textContent = result.full;

        // Branch info
        branchCodeSpan.textContent = result.branch;
        const branchName = getBranchName(result.branch);
        branchNameSpan.textContent = branchName || "Unknown Branch";
        if (!branchName) {
          branchNameSpan.style.color = "#dc2626";
        } else {
          branchNameSpan.style.color = "#0f9d58";
        }

        // Scheme info
        schemeCodeSpan.textContent = result.scheme;
        const schemeName = getSchemeName(result.scheme);
        const accountType = getAccountType(result.scheme);

        if (accountType) {
          schemeNameSpan.textContent = accountType.name;
          schemeNameSpan.style.color = "#1565c0";
        } else if (schemeName) {
          schemeNameSpan.textContent = schemeName;
          schemeNameSpan.style.color = "#1565c0";
        } else {
          schemeNameSpan.textContent = "Unknown Scheme";
          schemeNameSpan.style.color = "#dc2626";
        }

        // Account info
        accountNumSpan.textContent = result.account;

        if (accountType) {
          accountTypeSpan.textContent = accountType.short + " ✓";
          accountTypeSpan.style.color = "#ef6c00";
        } else {
          accountTypeSpan.textContent = "—";
          accountTypeSpan.style.color = "#94a3b8";
        }

        // Divided note
        if (result.typeKey === "divided") {
          dividedNoteDiv.innerHTML = `<i class="fa-solid fa-info-circle"></i> Divided format: sub-part ${result.sub} + main ${result.main} → account ${result.account}`;
          dividedNoteDiv.classList.add("show");
        } else {
          dividedNoteDiv.classList.remove("show");
        }

        resultCard.style.display = "block";
        return true;
      }

      function handleAutoConvert() {
        const rawValue = inputEl.value.trim();
        clearBtn.classList.toggle("show", rawValue.length > 0);

        if (rawValue === "") {
          resultCard.style.display = "none";
          hideErrorMsg();
          showFormatHint();
          currentParsedResult = null;
          return;
        }

        const parsed = parse(rawValue);
        if (!parsed || parsed.error) {
          showErrorMsg(parsed?.error || "Invalid account format");
          return;
        }
        hideErrorMsg();
        const success = updateResultUI(parsed);
        if (success && parsed.full) {
          addHist(rawValue, parsed);
        }
      }

      // ========== EVENT LISTENERS ==========
      inputEl.addEventListener("input", () => {
        handleAutoConvert();
      });

      clearBtn.addEventListener("click", () => {
        inputEl.value = "";
        clearBtn.classList.remove("show");
        resultCard.style.display = "none";
        hideErrorMsg();
        showFormatHint();
        currentParsedResult = null;
        inputEl.focus();
      });

      function onCopied() {
        copyButton.classList.add("copied");
        copyIcon.className = "fa-solid fa-check";
        copyLabelSpan.textContent = "Copied!";
        setTimeout(() => {
          copyButton.classList.remove("copied");
          copyIcon.className = "fa-regular fa-copy";
          copyLabelSpan.textContent = "Copy Full Number";
        }, 2000);
      }

      copyButton.addEventListener("click", () => {
        if (currentParsedResult && currentParsedResult.full) {
          const textToCopy = currentParsedResult.full;
          if (navigator.clipboard) {
            navigator.clipboard
              .writeText(textToCopy)
              .then(onCopied)
              .catch(() => fallbackCopy(textToCopy));
          } else {
            fallbackCopy(textToCopy);
          }
        }
      });

      function fallbackCopy(t) {
        const ta = document.createElement("textarea");
        ta.value = t;
        ta.style.cssText = "position:fixed;opacity:0";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
          onCopied();
        } catch (e) {}
        document.body.removeChild(ta);
      }

      document.getElementById("hclearBtn").addEventListener("click", () => {
        saveHist([]);
        renderHist();
      });

      backBtn.addEventListener("click", () => {
        if (window.history.length > 1) window.history.back();
        else alert("Go back to previous page");
      });

      // ========== INIT ==========
      renderHist();
      showFormatHint();
      inputEl.focus();
    </script>
